[project]
name = "bifrost"
version = "0.1.0"
description = "Python entry point for BIFROST, a Julia library for birefringence simulation in optical fiber."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "juliacall>=0.9.34",
    "numpy>=1.26",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/bifrost.py"]
sources = ["src"]
