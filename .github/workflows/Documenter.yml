name: Documentation

on:
  push:
    branches:
      - main
      - documentor-support   # TEMP: demo the workflow from this branch; remove before merge
    tags: ['*']
  pull_request:
  workflow_dispatch:

# Needed by Documenter's GITHUB_TOKEN-based gh-pages deploy.
permissions:
  contents: write
  pull-requests: read
  statuses: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'
      - uses: julia-actions/cache@v2
      - name: Instantiate docs environment
        run: |
          julia --startup-file=no --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path = pwd()))
            Pkg.instantiate()'
      - name: Build and deploy docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --startup-file=no --project=docs docs/make.jl
